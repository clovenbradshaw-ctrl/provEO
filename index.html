<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NL Explorer</title>
<style>
  /* Claude.ai-adjacent token system — refined, editorial */
  :root {
    --color-background-primary: #FAF9F5;
    --color-background-secondary: #F0EEE4;
    --color-background-tertiary: #E8E5D6;
    --color-text-primary: #1A1915;
    --color-text-secondary: #6B6558;
    --color-text-tertiary: #8F8878;
    --color-border-primary: #1A1915;
    --color-border-secondary: #C5BDA8;
    --color-border-tertiary: #DDD6C2;

    --amber-fill: #FAEEDA;
    --amber-mid: #BA7517;
    --amber-text: #633806;
    --red-fill: #FCEBEB;
    --red-mid: #E24B4A;
    --red-text: #501313;
    --blue-fill: #E6F1FB;
    --blue-mid: #378ADD;
    --blue-text: #042C53;
    --teal-fill: #E1F5EE;
    --teal-mid: #1D9E75;
    --teal-text: #04342C;

    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-serif: 'Tiempos Text', 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;

    --border-radius-sm: 3px;
    --border-radius-md: 5px;
    --border-radius-lg: 7px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--color-background-secondary);
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .shell {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 1440px;
    height: min(840px, calc(100vh - 32px));
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(26,25,21,0.04), 0 8px 32px rgba(26,25,21,0.05);
  }

  /* ---------- TOPBAR ---------- */
  .topbar {
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    height: 46px;
    flex-shrink: 0;
  }
  .appname {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.015em;
    margin-right: 24px;
  }
  .appname .dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--color-text-primary);
    margin-right: 7px;
    vertical-align: 2px;
  }
  .modetabs { display: flex; gap: 2px; }
  .mtab {
    padding: 6px 14px;
    border-radius: var(--border-radius-md);
    font-size: 13px;
    font-weight: 400;
    color: var(--color-text-secondary);
    cursor: pointer;
    border: none;
    background: transparent;
    font-family: inherit;
    transition: background 0.12s, color 0.12s;
  }
  .mtab:hover { color: var(--color-text-primary); }
  .mtab.active {
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    font-weight: 500;
  }
  .topright {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .srcbadge {
    font-size: 12px;
    color: var(--color-text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .srcbadge .statdot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .statdot-green { background: var(--teal-mid); }
  .statdot-amber {
    background: var(--amber-mid);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* ---------- BODY ---------- */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* ---------- SOURCES PANEL ---------- */
  .sources {
    width: 184px;
    flex-shrink: 0;
    border-right: 0.5px solid var(--color-border-tertiary);
    display: flex;
    flex-direction: column;
    background: var(--color-background-secondary);
  }
  .spanel-head {
    padding: 12px 14px 8px;
    font-size: 10px;
    font-weight: 600;
    color: var(--color-text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .slist {
    flex: 1;
    overflow-y: auto;
    padding: 2px 8px;
  }
  .sitem {
    padding: 8px 10px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    border: 0.5px solid transparent;
    margin-bottom: 2px;
    transition: background 0.12s, border-color 0.12s;
  }
  .sitem:hover {
    background: var(--color-background-primary);
    border-color: var(--color-border-tertiary);
  }
  .sitem.pending { opacity: 0.55; cursor: default; }
  .sitem-name {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.3;
    font-family: var(--font-mono);
  }
  .sitem-meta {
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stag {
    font-size: 9.5px;
    font-weight: 600;
    padding: 1.5px 5px;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }
  .stag-csv { background: var(--teal-fill); color: var(--teal-text); }
  .stag-pdf { background: var(--amber-fill); color: var(--amber-text); }
  .stag-txt { background: var(--blue-fill); color: var(--blue-text); }
  .sadd {
    margin: 8px 10px 10px;
    padding: 9px;
    border: 0.5px dashed var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    text-align: center;
    font-size: 12px;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .sadd:hover {
    border-color: var(--color-text-primary);
    color: var(--color-text-primary);
  }

  /* ---------- CENTER AREA ---------- */
  .mode-panel {
    display: none;
    flex: 1;
    overflow: hidden;
    flex-direction: row;
  }
  .mode-panel.active { display: flex; }

  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  /* ---------- EDITOR ---------- */
  .editor-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 32px 44px 24px;
  }
  .article-meta {
    font-size: 11.5px;
    color: var(--color-text-secondary);
    margin-bottom: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    letter-spacing: 0.01em;
  }
  .article-meta .sep {
    color: var(--color-border-secondary);
  }
  .counts {
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .counts .c-g { color: var(--amber-mid); }
  .counts .c-c { color: var(--red-mid); }
  .counts .c-a { color: var(--blue-mid); }

  .article-title {
    font-family: var(--font-serif);
    font-size: 26px;
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
    outline: none;
  }
  .article-title:focus {
    outline: none;
  }
  .article-body {
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.72;
    letter-spacing: -0.003em;
  }
  .article-body p { margin-bottom: 16px; }
  .article-body p:last-child { margin-bottom: 0; }

  /* Claim annotations */
  .g, .conflict, .absent {
    cursor: pointer;
    position: relative;
    transition: background 0.1s;
    border-radius: 2px;
    padding: 0 1px;
  }
  .g {
    border-bottom: 2px solid var(--amber-mid);
  }
  .g:hover, .g.active {
    background: var(--amber-fill);
  }
  .conflict {
    border-bottom: 2px dashed var(--red-mid);
  }
  .conflict:hover, .conflict.active {
    background: var(--red-fill);
  }
  .absent {
    border-bottom: 2px dotted var(--blue-mid);
  }
  .absent:hover, .absent.active {
    background: var(--blue-fill);
  }

  /* ---------- STATUS BAR ---------- */
  .statusbar {
    height: 34px;
    border-top: 0.5px solid var(--color-border-tertiary);
    padding: 0 44px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    background: var(--color-background-secondary);
  }
  .sstat {
    font-size: 11px;
    color: var(--color-text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
  }
  .sstat-n {
    font-weight: 600;
    color: var(--color-text-primary);
  }
  .sstat-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  /* ---------- RIGHT PANEL (PROVENANCE) ---------- */
  .right-panel {
    width: 296px;
    flex-shrink: 0;
    border-left: 0.5px solid var(--color-border-tertiary);
    display: flex;
    flex-direction: column;
    background: var(--color-background-primary);
  }
  .rp-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
  }
  .rp-empty-inner { text-align: center; }
  .rp-empty-glyph {
    font-size: 32px;
    opacity: 0.18;
    margin-bottom: 12px;
    font-family: var(--font-mono);
    line-height: 1;
  }
  .rp-empty-text {
    font-size: 12px;
    color: var(--color-text-secondary);
    line-height: 1.55;
  }
  .rp-content {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .rp-content.visible { display: flex; }
  .rphead {
    padding: 13px 16px 10px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .rphead-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
  }
  .rphead-title.type-grounded { color: var(--amber-text); }
  .rphead-title.type-conflict { color: var(--red-text); }
  .rphead-title.type-absent { color: var(--blue-text); }
  .rphead-close {
    font-size: 18px;
    color: var(--color-text-secondary);
    cursor: pointer;
    line-height: 1;
    border: none;
    background: transparent;
    padding: 0 4px;
    transition: color 0.12s;
  }
  .rphead-close:hover { color: var(--color-text-primary); }
  .rpbody {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }
  .prov-section { margin-bottom: 15px; }
  .prov-label {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 6px;
  }
  .prov-value {
    font-size: 12px;
    line-height: 1.5;
    font-family: var(--font-mono);
  }
  .prov-value.plain { font-family: var(--font-sans); }
  .prov-code {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 8px 10px;
    line-height: 1.55;
    word-break: break-word;
  }
  .prov-code.conflict-block {
    background: var(--red-fill);
    border-color: #F7C1C1;
    white-space: pre-line;
  }
  .conf-bar-wrap {
    height: 4px;
    background: var(--color-background-secondary);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .conf-bar {
    height: 4px;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .conf-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-top: 5px;
  }
  .divider {
    height: 0.5px;
    background: var(--color-border-tertiary);
    margin: 14px 0;
  }

  /* Traversal trace */
  .traverse {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 10px 12px;
  }
  .traverse-step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 3px 0;
  }
  .traverse-step-rail {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    padding-top: 4px;
  }
  .traverse-step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--color-border-secondary);
  }
  .traverse-step-dot.fired {
    background: var(--color-text-primary);
  }
  .traverse-step-line {
    width: 1px;
    background: var(--color-border-tertiary);
    flex: 1;
    margin-top: 2px;
    min-height: 6px;
  }
  .traverse-step:last-child .traverse-step-line { display: none; }
  .traverse-step-text {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--color-text-secondary);
    line-height: 1.45;
    flex: 1;
    padding-bottom: 4px;
  }
  .traverse-step-text strong {
    color: var(--color-text-primary);
    font-weight: 600;
  }
  .traverse-step-text .op {
    display: inline-block;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.02em;
    padding: 0.5px 4px;
    border-radius: 2px;
    margin-right: 4px;
  }
  .op-sig { background: #EDE9DA; color: var(--color-text-primary); }
  .op-ins { background: var(--teal-fill); color: var(--teal-text); }
  .op-con { background: #E8E4F5; color: #3E2F7A; }
  .op-eva { background: var(--amber-fill); color: var(--amber-text); }
  .op-nul { background: var(--blue-fill); color: var(--blue-text); }
  .op-def { background: #F5EDE0; color: var(--amber-text); }

  .prov-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .btn-sm {
    padding: 5px 11px;
    font-size: 11.5px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    font-weight: 500;
    border: 0.5px solid var(--color-border-secondary);
    background: transparent;
    color: var(--color-text-primary);
    font-family: inherit;
    transition: background 0.12s, border-color 0.12s;
  }
  .btn-sm:hover {
    background: var(--color-background-secondary);
    border-color: var(--color-text-primary);
  }
  .btn-sm-danger {
    border-color: #F09595;
    color: var(--red-text);
    background: var(--red-fill);
  }
  .btn-sm-danger:hover { background: #F7C1C1; }

  /* Provenance tag chips */
  .prov-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    border: 0.5px solid transparent;
    letter-spacing: 0.01em;
  }
  .prov-tag-amber { background: var(--amber-fill); color: var(--amber-text); border-color: #EDC89A; }
  .prov-tag-red { background: var(--red-fill); color: var(--red-text); border-color: #F7C1C1; }
  .prov-tag-blue { background: var(--blue-fill); color: var(--blue-text); border-color: #B5D4F4; }
  .prov-tag-teal { background: var(--teal-fill); color: var(--teal-text); border-color: #9FE1CB; }

  /* ---------- REVIEW MODE ---------- */
  .review-article {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    min-width: 0;
  }
  .review-queue {
    width: 320px;
    flex-shrink: 0;
    border-left: 0.5px solid var(--color-border-tertiary);
    overflow-y: auto;
    padding: 14px;
    background: var(--color-background-primary);
  }
  .qhead {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 12px;
    padding: 0 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .qhead-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-text-primary);
  }
  .qcard {
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 12px 13px;
    margin-bottom: 8px;
    cursor: pointer;
    background: var(--color-background-primary);
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .qcard:hover {
    border-color: var(--color-border-secondary);
  }
  .qcard.selected {
    border-color: var(--color-text-primary);
    box-shadow: 0 0 0 2px rgba(26,25,21,0.04);
  }
  .qcard.resolved {
    opacity: 0.45;
  }
  .qcard-head {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 7px;
  }
  .qcard-text {
    font-size: 12.5px;
    line-height: 1.5;
    margin-bottom: 7px;
    font-family: var(--font-serif);
  }
  .qcard-source {
    font-size: 10.5px;
    font-family: var(--font-mono);
    color: var(--color-text-secondary);
    margin-bottom: 9px;
    line-height: 1.4;
    word-break: break-all;
  }
  .qcard-actions {
    display: flex;
    gap: 5px;
  }
  .qa {
    padding: 4px 9px;
    font-size: 11px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    border: 0.5px solid var(--color-border-secondary);
    background: transparent;
    color: var(--color-text-primary);
    font-weight: 500;
    font-family: inherit;
    transition: background 0.12s, border-color 0.12s;
  }
  .qa:hover { background: var(--color-background-secondary); }
  .qa-confirm {
    border-color: #5DCAA5;
    color: var(--teal-text);
    background: var(--teal-fill);
  }
  .qa-confirm:hover { background: #9FE1CB; }
  .qa-release {
    border-color: #F09595;
    color: var(--red-text);
  }
  .qa-release:hover { background: var(--red-fill); }
  .qempty {
    padding: 32px 12px;
    text-align: center;
    color: var(--color-text-secondary);
    font-size: 12px;
    line-height: 1.55;
  }

  /* ---------- CHAT MODE ---------- */
  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .chat-msgs {
    flex: 1;
    overflow-y: auto;
    padding: 22px 32px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .chat-msg {
    display: flex;
    gap: 11px;
    align-items: flex-start;
  }
  .chat-msg-user { flex-direction: row-reverse; }
  .chat-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
  }
  .av-sys {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-secondary);
    font-family: var(--font-mono);
    font-size: 10px;
  }
  .av-user {
    background: var(--blue-fill);
    color: var(--blue-text);
  }
  .chat-bubble {
    max-width: 580px;
    font-size: 13.5px;
    line-height: 1.65;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 12px 14px;
    font-family: var(--font-serif);
  }
  .chat-bubble-user {
    background: var(--color-background-primary);
    border-color: var(--color-border-secondary);
  }
  .chat-bubble p { margin-bottom: 10px; }
  .chat-bubble p:last-child { margin-bottom: 0; }
  .chat-meta-note {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .fold-badge {
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--amber-fill);
    color: var(--amber-text);
    letter-spacing: 0.02em;
  }
  .evidence-toggle {
    margin-top: 10px;
    border-top: 0.5px solid var(--color-border-tertiary);
    padding-top: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    font-family: var(--font-sans);
    user-select: none;
  }
  .ev-toggle-label {
    font-size: 11px;
    color: var(--color-text-secondary);
    font-weight: 500;
  }
  .ev-toggle-count {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--color-text-secondary);
  }
  .ev-cards {
    margin-top: 9px;
    display: none;

<script>
/* ===========================================================================
   NL EXPLORER
   ---------------------------------------------------------------------------
   A prototype newsroom tool where every written claim is an event dispatched
   through the EO-DB nine-case fold. The fold classifies each claim as
   grounded / conflict / absent by walking the operator stages:
     SIG → recognize signal (pattern hit in source)
     INS → mint anchor (entity/value identity established)
     CON → link to graph (cross-source edges)
     DEF → establish term (assignment of value)
     EVA → evaluate against definitions (confirm / conflict)
     NUL → record absence (expected pattern not found)
   Provenance is the traversal trace itself — nothing to reconstruct after
   the fact because nothing was thrown away.
============================================================================ */

/* ---------- SOURCES ---------- */
const SOURCES = [
  { id: 'ndp', name: 'ndp_budget_fy25.csv', kind: 'csv', meta: '847 rows', indexed: true },
  { id: 'min', name: 'council_minutes_mar7.pdf', kind: 'pdf', meta: '12 pp', indexed: true },
  { id: 'ohs', name: 'ohs_quarterly_q4.pdf', kind: 'pdf', meta: '31 pp', indexed: true },
  { id: 'ven', name: 'vendor_contracts.txt', kind: 'txt', meta: 'indexing…', indexed: false }
];

/* ---------- ARTICLE (claims are events in the given-log) ---------- */
/* Each run is a text fragment; claims have .id and a :claim marker.       */
const ARTICLE = [
  { p: [
    { t: 'The Nashville Downtown Partnership received ' },
    { t: '$4.2 million', c: 'm1' },
    { t: ' in public funds during fiscal year 2025, a ' },
    { t: '14.3 percent increase', c: 'm2' },
    { t: ' over the prior year, according to budget documents obtained from Metro Finance. The increase followed a motion by ' },
    { t: 'Councilmember Torres', c: 'm3' },
    { t: ' on ' },
    { t: 'March 7', c: 'm4' },
    { t: ' to amend the public safety allocation.' }
  ]},
  { p: [
    { t: 'The Partnership has contracted with ' },
    { t: 'Solaren International', c: 'm5' },
    { t: ' for private security services since ' },
    { t: '2019', c: 'm6' },
    { t: ', at a cost the organization describes as ' },
    { t: '$280,000 annually', c: 'c1' },
    { t: '. Internal documents reviewed by this reporter put the figure at ' },
    { t: '$312,000', c: 'm7' },
    { t: ', a discrepancy the Partnership has not publicly explained.' }
  ]},
  { p: [
    { t: "Metro's Office of Homeless Services " },
    { t: 'did not respond to requests for comment', c: 'a1' },
    { t: " about the overlap between the Partnership's security footprint and OHS encampment clearance operations. " },
    { t: 'No disclosure of the Solaren contract', c: 'a2' },
    { t: " appears in the Partnership's public filings for the period." }
  ]}
];

/* ---------- CLAIMS (fold output — what the nine-case dispatch produced) */
const CLAIMS = {
  m1: {
    type: 'grounded',
    text: '$4.2 million',
    source: 'ndp_budget_fy25.csv · rows 112–116',
    op: 'SUM(amount) WHERE dept=public_safety AND fy=2025',
    conf: 1.00,
    trace: [
      { op: 'SIG', txt: 'value pattern <code>\\$[\\d.]+M</code> hit — six occurrences aggregated' },
      { op: 'INS', txt: 'document anchor minted for <strong>public_safety_2025</strong> line set' },
      { op: 'CON', txt: 'linked to NDP entity via <strong>recipient_id</strong> column' },
      { op: 'DEF', txt: '<strong>SUM</strong> evaluated: $4,231,440 → rounded presentation $4.2M' },
      { op: 'EVA', txt: 'value confirmed against cross-check total; no conflict' }
    ],
    status: 'pending'
  },
  m2: {
    type: 'grounded',
    text: '14.3 percent increase',
    source: 'ndp_budget_fy25.csv · rows 88–91 (2024), 112–116 (2025)',
    op: '(SUM_2025 − SUM_2024) / SUM_2024 × 100',
    conf: 1.00,
    trace: [
      { op: 'SIG', txt: 'year field populated on two disjoint row ranges' },
      { op: 'INS', txt: 'two anchors minted: <strong>ps_2024</strong>, <strong>ps_2025</strong>' },
      { op: 'CON', txt: 'anchors linked by <strong>dept=public_safety</strong> predicate' },
      { op: 'DEF', txt: 'delta computed: (4,231,440 − 3,703,250) / 3,703,250 = 0.1426' },
      { op: 'EVA', txt: 'result within plausibility bounds — no reconciliation needed' }
    ],
    status: 'pending'
  },
  m3: {
    type: 'grounded',
    text: 'Councilmember Torres',
    source: 'council_minutes_mar7.pdf · p.4 · span[1204:1220]',
    op: 'NER:PERSON + COREF_RESOLVE',
    conf: 0.97,
    trace: [
      { op: 'SIG', txt: 'PERSON pattern hit; surface form "Councilmember Torres"' },
      { op: 'INS', txt: 'anchor minted for <strong>person:torres_v</strong>' },
      { op: 'CON', txt: 'coref chain resolved — three downstream "she" mentions linked' },
      { op: 'EVA', txt: 'disambiguation score 0.97 vs. <strong>Torres, L.</strong> (sports page)' }
    ],
    status: 'pending'
  },
  m4: {
    type: 'grounded',
    text: 'March 7',
    source: 'council_minutes_mar7.pdf · p.1 header',
    op: 'NER:DATE + temporal_anchor',
    conf: 0.99,
    trace: [
      { op: 'SIG', txt: 'DATE pattern on meeting header' },
      { op: 'INS', txt: 'temporal anchor minted: <strong>2026-03-07</strong>' },
      { op: 'CON', txt: 'linked to Torres motion record within same session' }
    ],
    status: 'pending'
  },
  m5: {
    type: 'grounded',
    text: 'Solaren International',
    source: 'vendor_contracts.txt · line 88',
    op: 'NER:ORG',
    conf: 0.94,
    trace: [
      { op: 'SIG', txt: 'ORG pattern hit' },
      { op: 'INS', txt: 'anchor minted: <strong>org:solaren_intl</strong>' },
      { op: 'CON', txt: 'linked to NDP via <strong>vendor_of</strong> edge' }
    ],
    status: 'pending'
  },
  m6: {
    type: 'grounded',
    text: '2019',
    source: 'vendor_contracts.txt · line 88',
    op: 'NER:DATE (year-only)',
    conf: 0.93,
    trace: [
      { op: 'SIG', txt: 'year pattern; no month/day' },
      { op: 'CON', txt: 'linked to Solaren anchor as <strong>contract_since</strong>' }
    ],
    status: 'pending'
  },
  m7: {
    type: 'grounded',
    text: '$312,000',
    source: 'ndp_budget_fy25.csv · row 201',
    op: 'LOOKUP(vendor=solaren, fy=2025)',
    conf: 1.00,
    trace: [
      { op: 'SIG', txt: 'value pattern hit on row 201' },
      { op: 'INS', txt: 'anchor minted: <strong>contract_line_201</strong>' },
      { op: 'CON', txt: 'linked to org:solaren_intl' },
      { op: 'EVA', txt: 'value recorded; triggers conflict check against c1' }
    ],
    status: 'pending'
  },
  c1: {
    type: 'conflict',
    text: '$280,000 annually',
    source: 'council_minutes_mar7.pdf · p.4 ⟷ ndp_budget_fy25.csv · row 201',
    op: 'EVA: reported ≠ source-of-record',
    conf: 0.90,
    conflict: 'Reported value: $280,000 (NDP public statement, minutes p.4)\nSource value: $312,000 (budget row 201, overtime_actual column)\nDelta: $32,000 (+11.4%) — resolution: null',
    trace: [
      { op: 'SIG', txt: 'value pattern matched in both sources' },
      { op: 'CON', txt: 'both anchors route to org:solaren_intl' },
      { op: 'EVA', txt: 'value mismatch detected → <strong>conflict event emitted</strong>' },
      { op: 'DEF', txt: 'neither value preferred — both held in superposition' }
    ],
    status: 'pending'
  },
  a1: {
    type: 'absent',
    text: 'did not respond to requests for comment',
    source: 'stageNUL · expected OHS response entity not found',
    op: 'NUL: expected_response_pattern ∉ indexed_sources',
    conf: 0.85,
    trace: [
      { op: 'NUL', txt: 'absence pattern probed: <strong>OHS response</strong> in 14-day window' },
      { op: 'SIG', txt: 'no matching anchor in ohs_quarterly_q4 or related threads' },
      { op: 'EVA', txt: 'absence stands — three contact attempts logged, zero replies' }
    ],
    status: 'pending'
  },
  a2: {
    type: 'absent',
    text: 'No disclosure of the Solaren contract',
    source: 'stageNUL · vendor_contracts.txt ∩ ohs_quarterly_q4.pdf',
    op: 'NUL: disclosure_pattern ∉ filing_period',
    conf: 0.88,
    trace: [
      { op: 'NUL', txt: 'disclosure pattern probed against Q4 filing schema' },
      { op: 'SIG', txt: 'no "material contracts" section references Solaren' },
      { op: 'EVA', txt: 'absence stands across Q1–Q4 2025 filings' }
    ],
    status: 'pending'
  }
};

/* ---------- CHAT ---------- */
const CHAT_HISTORY = [
  {
    role: 'user',
    text: "What is NDP's financial relationship to OHS?"
  },
  {
    role: 'system',
    meta: 'Fold-computable · CON-graph traversal',
    html: `This answer traverses the CON graph directly — no LLM generation in the load-bearing claims.<br><br>
The Nashville Downtown Partnership received <span class="g">$4.2M in public safety funds</span> in FY2025, routed through Metro Finance. The Partnership's <span class="g">Solaren contract ($312K)</span> operates in the same geographic zones as <span class="g">OHS encampment clearance operations</span>, with <span class="absent">no formal coordination agreement disclosed</span> in public filings.`,
    evidence: [
      { claim: '$4.2M public safety funds', path: 'ndp_budget_fy25.csv · SUM(amount) · rows 112–116', tag: 'mechanical', tagColor: 'amber' },
      { claim: 'Solaren contract $312K', path: 'ndp_budget_fy25.csv · row 201 · LOOKUP(overtime_actual)', tag: 'mechanical', tagColor: 'amber' },
      { claim: 'Same geographic zones', path: 'geo_polygon_overlap · ndp_security_zones ∩ ohs_sweep_logs', tag: 'mechanical', tagColor: 'amber' },
      { claim: 'No coordination agreement', path: 'stageNUL · ohs_quarterly_q4.pdf · expected disclosure pattern', tag: 'absent', tagColor: 'blue' }
    ]
  }
];

/* ---------- INSTRUCTION SET (learned refinement rules) ---------- */
const ISET = [
  { type: 'COREF', color: 'stag-pdf', trigger: 'human correction', text: 'Torres → resolve "she" within same paragraph scope' },
  { type: 'XREF', color: 'stag-csv', trigger: 'recursive', text: 'Budget line items co-occurring with minutes concept nodes → attempt cross-source link' },
  { type: 'NUL', color: 'stag-txt', trigger: 'llm reflection', text: 'Absence of contract disclosure in quarterly filing = NUL event, not silence' }
];

/* ============================================================ */
/* ========== RENDERING ====================================== */
/* ============================================================ */

const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];

let selectedClaimId = null;
let selectedReviewId = null;

/* ---- Sources ---- */
function renderSources() {
  $('#slist').innerHTML = SOURCES.map(s => `
    <div class="sitem${s.indexed ? '' : ' pending'}">
      <div class="sitem-name">${s.name}</div>
      <div class="sitem-meta">
        <span class="stag stag-${s.kind}">${s.kind.toUpperCase()}</span>${s.meta}
      </div>
    </div>
  `).join('');
}

/* ---- Article body: render runs, wrap claims in span with class ---- */
function articleHtml({interactive = true} = {}) {
  return ARTICLE.map(para => {
    const inner = para.p.map(r => {
      if (!r.c) return escapeHtml(r.t);
      const claim = CLAIMS[r.c];
      const cls = claim.type === 'grounded' ? 'g' : claim.type === 'conflict' ? 'conflict' : 'absent';
      const attrs = interactive
        ? `class="${cls}" data-id="${r.c}"`
        : `class="${cls}"`;
      return `<span ${attrs}>${escapeHtml(r.t)}</span>`;
    }).join('');
    return `<p>${inner}</p>`;
  }).join('');
}

function renderArticleBody(container, {interactive = true} = {}) {
  container.innerHTML = articleHtml({interactive});
  if (interactive) {
    container.querySelectorAll('[data-id]').forEach(el => {
      el.addEventListener('click', () => showClaim(el.dataset.id));
    });
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ---- Counts ---- */
function renderCounts() {
  const all = Object.values(CLAIMS);
  const g = all.filter(c => c.type === 'grounded').length;
  const c = all.filter(c => c.type === 'conflict').length;
  const a = all.filter(c => c.type === 'absent').length;
  $('#stat-g').textContent = g;
  $('#stat-c').textContent = c;
  $('#stat-a').textContent = a;
  $('#counts-meta').innerHTML =
    `<span class="c-g">${g} grounded</span> · <span class="c-c">${c} conflict</span> · <span class="c-a">${a} absent</span>`;
}

/* ---- Claim detail panel ---- */
function showClaim(id) {
  const claim = CLAIMS[id];
  if (!claim) return;
  selectedClaimId = id;

  $$('.g, .conflict, .absent', $('#article-body')).forEach(el => el.classList.remove('active'));
  const el = $(`[data-id="${id}"]`, $('#article-body'));
  if (el) el.classList.add('active');

  $('#rp-empty').style.display = 'none';
  $('#rp-content').classList.add('visible');

  const typeLabels = {
    grounded: 'Grounded · mechanical',
    conflict: 'Conflict · EVA fired',
    absent: 'Absent · NUL event'
  };
  const typeLabel = $('#rp-type-label');
  typeLabel.textContent = typeLabels[claim.type];
  typeLabel.className = 'rphead-title type-' + claim.type;

  const confColor =
    claim.conf >= 0.97 ? 'var(--teal-mid)' :
    claim.conf >= 0.85 ? 'var(--amber-mid)' : 'var(--red-mid)';

  let body = `
    <div class="prov-section">
      <div class="prov-label">Claim</div>
      <div class="prov-code">"${escapeHtml(claim.text)}"</div>
    </div>
    <div class="prov-section">
      <div class="prov-label">Source</div>
      <div class="prov-value">${escapeHtml(claim.source)}</div>
    </div>
    <div class="prov-section">
      <div class="prov-label">Operation</div>
      <div class="prov-code">${escapeHtml(claim.op)}</div>
    </div>
  `;

  if (claim.conflict) {
    body += `
      <div class="prov-section">
        <div class="prov-label">Conflict</div>
        <div class="prov-code conflict-block">${escapeHtml(claim.conflict)}</div>
      </div>
    `;
  }

  body += `
    <div class="prov-section">
      <div class="prov-label">Fold traversal</div>
      <div class="traverse">
        ${claim.trace.map((step, i) => `
          <div class="traverse-step">
            <div class="traverse-step-rail">
              <div class="traverse-step-dot fired"></div>
              <div class="traverse-step-line"></div>
            </div>
            <div class="traverse-step-text">
              <span class="op op-${step.op.toLowerCase()}">${step.op}</span>${step.txt}
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="prov-section">
      <div class="prov-label">Confidence</div>
      <div class="conf-bar-wrap">
        <div class="conf-bar" style="width: ${Math.round(claim.conf * 100)}%; background: ${confColor};"></div>
      </div>
      <div class="conf-label">${claim.conf.toFixed(2)} · ${
        claim.conf >= 0.97 ? 'mechanical' :
        claim.conf >= 0.85 ? 'probabilistic' : 'weak'
      }</div>
    </div>

    <div class="divider"></div>

    <div class="prov-actions">
      <button class="btn-sm">Correct</button>
      <button class="btn-sm btn-sm-danger">Release</button>
    </div>
  `;

  $('#rp-body').innerHTML = body;
}

function closeClaim() {
  selectedClaimId = null;
  $$('.g, .conflict, .absent', $('#article-body')).forEach(el => el.classList.remove('active'));
  $('#rp-empty').style.display = 'flex';
  $('#rp-content').classList.remove('visible');
}

/* ---- Review queue ---- */
function renderReview() {
  $('#review-article').innerHTML = `
    <div class="article-meta">
      <span style="color: var(--color-text-secondary)">Review mode · read only</span>
    </div>
    <h1 class="article-title" style="font-family: var(--font-serif)">The Private Police and the Public Budget</h1>
    <div class="article-body">${articleHtml({interactive: false})}</div>
  `;

  const pending = Object.entries(CLAIMS).filter(([, c]) => c.status === 'pending');
  $('#qhead-count').textContent = `${pending.length} remaining`;

  const queue = Object.entries(CLAIMS)
    .sort(([, a], [, b]) => {
      const order = {conflict: 0, absent: 1, grounded: 2};
      if (a.status !== b.status) return a.status === 'pending' ? -1 : 1;
      return order[a.type] - order[b.type];
    });

  $('#qlist').innerHTML = queue.map(([id, c]) => {
    if (c.status !== 'pending') return '';
    const tagMap = {grounded: 'prov-tag-amber', conflict: 'prov-tag-red', absent: 'prov-tag-blue'};
    const label = {grounded: 'grounded', conflict: 'conflict', absent: 'absent'}[c.type];
    const selected = selectedReviewId === id ? ' selected' : '';
    const opLine = c.type === 'conflict'
      ? `"${escapeHtml(c.text)}" · source says ${escapeHtml(c.op.replace('EVA: ', ''))}`
      : `"${escapeHtml(c.text)}" · ${escapeHtml(c.op)}`;
    return `
      <div class="qcard${selected}" data-id="${id}">
        <div class="qcard-head">
          <span class="prov-tag ${tagMap[c.type]}">${label}</span>
        </div>
        <div class="qcard-text">${opLine}</div>
        <div class="qcard-source">${escapeHtml(c.source)}</div>
        <div class="qcard-actions">
          <button class="qa qa-confirm" data-action="confirm" data-id="${id}">Confirm</button>
          <button class="qa" data-action="correct" data-id="${id}">Correct</button>
          <button class="qa qa-release" data-action="release" data-id="${id}">Release</button>
        </div>
      </div>
    `;
  }).join('') || `<div class="qempty">queue clear<br><span style="opacity:0.7">all claims resolved</span></div>`;

  $$('.qa', $('#qlist')).forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      if (action === 'confirm') { CLAIMS[id].status = 'confirmed'; }
      else if (action === 'release') { CLAIMS[id].status = 'released'; }
      else if (action === 'correct') { CLAIMS[id].status = 'corrected'; }
      renderReview();
    });
  });

  $$('.qcard', $('#qlist')).forEach(card => {
    card.addEventListener('click', () => {
      selectedReviewId = card.dataset.id;
      renderReview();
    });
  });
}

/* ---- Chat ---- */
function renderChat() {
  $('#chat-msgs').innerHTML = CHAT_HISTORY.map((m, i) => {
    if (m.role === 'user') {
      return `
        <div class="chat-msg chat-msg-user">
          <div class="chat-avatar av-user">M</div>
          <div class="chat-bubble chat-bubble-user">${escapeHtml(m.text)}</div>
        </div>
      `;
    }
    // system
    const evBlock = m.evidence ? `
      <div class="evidence-toggle" data-ev="${i}">
        <span class="ev-toggle-label">Evidence — ${m.evidence.length} claims</span>
        <span class="ev-toggle-count">show ↓</span>
      </div>
      <div class="ev-cards" id="ev-cards-${i}">
        ${m.evidence.map(e => `
          <div class="ev-card">
            <div class="ev-card-claim">${escapeHtml(e.claim)}</div>
            <div class="ev-card-path">${escapeHtml(e.path)}</div>
            <div class="ev-card-footer">
              <span class="prov-tag prov-tag-${e.tagColor}">${e.tag}</span>
              <button class="ev-rederive">re-derive</button>
            </div>
          </div>
        `).join('')}
      </div>
    ` : '';

    const metaNote = m.meta ? `
      <div class="chat-meta-note">
        <span class="fold-badge">fold</span>${escapeHtml(m.meta)}
      </div>
    ` : '';

    return `
      <div class="chat-msg">
        <div class="chat-avatar av-sys">NL</div>
        <div class="chat-bubble">
          ${metaNote}
          <div>${m.html}</div>
          ${evBlock}
        </div>
      </div>
    `;
  }).join('');

  $$('.evidence-toggle').forEach(el => {
    el.addEventListener('click', () => {
      const i = el.dataset.ev;
      const cards = $('#ev-cards-' + i);
      const open = cards.classList.toggle('open');
      el.querySelector('.ev-toggle-count').textContent = open ? 'hide ↑' : 'show ↓';
    });
  });

  // instruction set
  $('#iset-body').innerHTML = ISET.map(r => `
    <div class="iset-rule">
      <div class="iset-rule-head">
        <span class="iset-type stag ${r.color}">${r.type}</span>
        <span class="iset-trigger">${r.trigger}</span>
      </div>
      <div class="iset-text">${escapeHtml(r.text)}</div>
    </div>
  `).join('') + `
    <div class="iset-footer">
      3 rules · 2 firings today · 1 candidate refinement pending review
    </div>
  `;
}

function sendChatMessage() {
  const input = $('#chat-input');
  const text = input.value.trim();
  if (!text) return;
  CHAT_HISTORY.push({ role: 'user', text });
  // stub response — in a real build this is the fold applied to the question
  CHAT_HISTORY.push({
    role: 'system',
    meta: 'LLM synthesis · grounded in fold state',
    html: `Indexed sources don't yet answer that directly. The fold has ${
      Object.values(CLAIMS).filter(c => c.type === 'grounded').length
    } grounded claims and ${
      Object.values(CLAIMS).filter(c => c.type === 'absent').length
    } NUL events against the corpus as loaded. Would you like me to register this as a new query intent, so future ingested sources are scanned for it?`,
    evidence: null
  });
  input.value = '';
  input.style.height = 'auto';
  renderChat();
  $('#chat-msgs').scrollTop = $('#chat-msgs').scrollHeight;
}

/* ---- Mode switching ---- */
function switchMode(mode) {
  $$('.mtab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  $$('.mode-panel').forEach(p => p.classList.toggle('active', p.id === 'mode-' + mode));

  if (mode === 'review') renderReview();
  if (mode === 'chat') renderChat();
}

/* ---- Boot ---- */
function init() {
  renderSources();
  renderArticleBody($('#article-body'));
  renderCounts();

  $$('.mtab').forEach(b => {
    b.addEventListener('click', () => switchMode(b.dataset.mode));
  });

  $('#rp-close').addEventListener('click', closeClaim);

  $('#chat-send').addEventListener('click', sendChatMessage);
  $('#chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChatMessage();
    }
  });
  $('#chat-input').addEventListener('input', e => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  });
}

init();
</script>
</body>
