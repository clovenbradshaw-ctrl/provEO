<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NL Explorer</title>
<style>
  /* Claude.ai-adjacent token system — refined, editorial */
  :root {
    --color-background-primary: #FAF9F5;
    --color-background-secondary: #F0EEE4;
    --color-background-tertiary: #E8E5D6;
    --color-text-primary: #1A1915;
    --color-text-secondary: #6B6558;
    --color-text-tertiary: #8F8878;
    --color-border-primary: #1A1915;
    --color-border-secondary: #C5BDA8;
    --color-border-tertiary: #DDD6C2;

    --amber-fill: #FAEEDA;
    --amber-mid: #BA7517;
    --amber-text: #633806;
    --red-fill: #FCEBEB;
    --red-mid: #E24B4A;
    --red-text: #501313;
    --blue-fill: #E6F1FB;
    --blue-mid: #378ADD;
    --blue-text: #042C53;
    --teal-fill: #E1F5EE;
    --teal-mid: #1D9E75;
    --teal-text: #04342C;

    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-serif: 'Tiempos Text', 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;

    --border-radius-sm: 3px;
    --border-radius-md: 5px;
    --border-radius-lg: 7px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--color-background-secondary);
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .shell {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 1440px;
    height: min(840px, calc(100vh - 32px));
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(26,25,21,0.04), 0 8px 32px rgba(26,25,21,0.05);
  }

  /* ---------- TOPBAR ---------- */
  .topbar {
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    height: 46px;
    flex-shrink: 0;
  }
  .appname {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.015em;
    margin-right: 24px;
  }
  .appname .dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--color-text-primary);
    margin-right: 7px;
    vertical-align: 2px;
  }
  .modetabs { display: flex; gap: 2px; }
  .mtab {
    padding: 6px 14px;
    border-radius: var(--border-radius-md);
    font-size: 13px;
    font-weight: 400;
    color: var(--color-text-secondary);
    cursor: pointer;
    border: none;
    background: transparent;
    font-family: inherit;
    transition: background 0.12s, color 0.12s;
  }
  .mtab:hover { color: var(--color-text-primary); }
  .mtab.active {
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    font-weight: 500;
  }
  .topright {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .srcbadge {
    font-size: 12px;
    color: var(--color-text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .srcbadge .statdot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .statdot-green { background: var(--teal-mid); }
  .statdot-amber {
    background: var(--amber-mid);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* ---------- BODY ---------- */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* ---------- SOURCES PANEL ---------- */
  .sources {
    width: 184px;
    flex-shrink: 0;
    border-right: 0.5px solid var(--color-border-tertiary);
    display: flex;
    flex-direction: column;
    background: var(--color-background-secondary);
  }
  .spanel-head {
    padding: 12px 14px 8px;
    font-size: 10px;
    font-weight: 600;
    color: var(--color-text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .slist {
    flex: 1;
    overflow-y: auto;
    padding: 2px 8px;
  }
  .sitem {
    padding: 8px 10px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    border: 0.5px solid transparent;
    margin-bottom: 2px;
    transition: background 0.12s, border-color 0.12s;
  }
  .sitem:hover {
    background: var(--color-background-primary);
    border-color: var(--color-border-tertiary);
  }
  .sitem.pending { opacity: 0.55; cursor: default; }
  .sitem-name {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.3;
    font-family: var(--font-mono);
  }
  .sitem-meta {
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stag {
    font-size: 9.5px;
    font-weight: 600;
    padding: 1.5px 5px;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }
  .stag-csv { background: var(--teal-fill); color: var(--teal-text); }
  .stag-pdf { background: var(--amber-fill); color: var(--amber-text); }
  .stag-txt { background: var(--blue-fill); color: var(--blue-text); }
  .sadd {
    margin: 8px 10px 10px;
    padding: 9px;
    border: 0.5px dashed var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    text-align: center;
    font-size: 12px;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .sadd:hover {
    border-color: var(--color-text-primary);
    color: var(--color-text-primary);
  }

  /* ---------- CENTER AREA ---------- */
  .mode-panel {
    display: none;
    flex: 1;
    overflow: hidden;
    flex-direction: row;
  }
  .mode-panel.active { display: flex; }

  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  /* ---------- EDITOR ---------- */
  .editor-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 32px 44px 24px;
  }
  .article-meta {
    font-size: 11.5px;
    color: var(--color-text-secondary);
    margin-bottom: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    letter-spacing: 0.01em;
  }
  .article-meta .sep {
    color: var(--color-border-secondary);
  }
  .counts {
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .counts .c-g { color: var(--amber-mid); }
  .counts .c-c { color: var(--red-mid); }
  .counts .c-a { color: var(--blue-mid); }

  .article-title {
    font-family: var(--font-serif);
    font-size: 26px;
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
    outline: none;
  }
  .article-title:focus {
    outline: none;
  }
  .article-body {
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.72;
    letter-spacing: -0.003em;
  }
  .article-body p { margin-bottom: 16px; }
  .article-body p:last-child { margin-bottom: 0; }

  /* Claim annotations */
  .g, .conflict, .absent {
    cursor: pointer;
    position: relative;
    transition: background 0.1s;
    border-radius: 2px;
    padding: 0 1px;
  }
  .g {
    border-bottom: 2px solid var(--amber-mid);
  }
  .g:hover, .g.active {
    background: var(--amber-fill);
  }
  .conflict {
    border-bottom: 2px dashed var(--red-mid);
  }
  .conflict:hover, .conflict.active {
    background: var(--red-fill);
  }
  .absent {
    border-bottom: 2px dotted var(--blue-mid);
  }
  .absent:hover, .absent.active {
    background: var(--blue-fill);
  }

  /* ---------- STATUS BAR ---------- */
  .statusbar {
    height: 34px;
    border-top: 0.5px solid var(--color-border-tertiary);
    padding: 0 44px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    background: var(--color-background-secondary);
  }
  .sstat {
    font-size: 11px;
    color: var(--color-text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
  }
  .sstat-n {
    font-weight: 600;
    color: var(--color-text-primary);
  }
  .sstat-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  /* ---------- RIGHT PANEL (PROVENANCE) ---------- */
  .right-panel {
    width: 400px;
    flex-shrink: 0;
    border-left: 0.5px solid var(--color-border-tertiary);
    display: flex;
    flex-direction: column;
    background: var(--color-background-primary);
  }
  .rp-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
  }
  .rp-empty-inner { text-align: center; }
  .rp-empty-glyph {
    font-size: 32px;
    opacity: 0.18;
    margin-bottom: 12px;
    font-family: var(--font-mono);
    line-height: 1;
  }
  .rp-empty-text {
    font-size: 12px;
    color: var(--color-text-secondary);
    line-height: 1.55;
  }
  .rp-content {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .rp-content.visible { display: flex; }
  .rphead {
    padding: 13px 16px 10px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .rphead-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
  }
  .rphead-title.type-grounded { color: var(--amber-text); }
  .rphead-title.type-conflict { color: var(--red-text); }
  .rphead-title.type-absent { color: var(--blue-text); }
  .rphead-close {
    font-size: 18px;
    color: var(--color-text-secondary);
    cursor: pointer;
    line-height: 1;
    border: none;
    background: transparent;
    padding: 0 4px;
    transition: color 0.12s;
  }
  .rphead-close:hover { color: var(--color-text-primary); }
  .rpbody {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }
  .prov-section { margin-bottom: 15px; }
  .prov-label {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 6px;
  }
  .prov-value {
    font-size: 12px;
    line-height: 1.5;
    font-family: var(--font-mono);
  }
  .prov-value.plain { font-family: var(--font-sans); }
  .prov-code {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 8px 10px;
    line-height: 1.55;
    word-break: break-word;
  }
  .prov-code.conflict-block {
    background: var(--red-fill);
    border-color: #F7C1C1;
    white-space: pre-line;
  }
  .conf-bar-wrap {
    height: 4px;
    background: var(--color-background-secondary);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .conf-bar {
    height: 4px;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .conf-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-top: 5px;
  }
  .divider {
    height: 0.5px;
    background: var(--color-border-tertiary);
    margin: 14px 0;
  }

  /* Traversal trace */
  .traverse {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 10px 12px;
  }
  .traverse-step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 3px 0;
  }
  .traverse-step-rail {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    padding-top: 4px;
  }
  .traverse-step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--color-border-secondary);
  }
  .traverse-step-dot.fired {
    background: var(--color-text-primary);
  }
  .traverse-step-line {
    width: 1px;
    background: var(--color-border-tertiary);
    flex: 1;
    margin-top: 2px;
    min-height: 6px;
  }
  .traverse-step:last-child .traverse-step-line { display: none; }
  .traverse-step-text {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--color-text-secondary);
    line-height: 1.45;
    flex: 1;
    padding-bottom: 4px;
  }
  .traverse-step-text strong {
    color: var(--color-text-primary);
    font-weight: 600;
  }
  .traverse-step-text .op {
    display: inline-block;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.02em;
    padding: 0.5px 4px;
    border-radius: 2px;
    margin-right: 4px;
  }
  .op-sig { background: #EDE9DA; color: var(--color-text-primary); }
  .op-ins { background: var(--teal-fill); color: var(--teal-text); }
  .op-con { background: #E8E4F5; color: #3E2F7A; }
  .op-eva { background: var(--amber-fill); color: var(--amber-text); }
  .op-nul { background: var(--blue-fill); color: var(--blue-text); }
  .op-def { background: #F5EDE0; color: var(--amber-text); }

  .prov-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  /* ---------- PROVENANCE VIEWS (new) ---------- */

  /* Source chip — always at top of panel, anchors "this came from" */
  .source-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 11px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    font-family: var(--font-mono);
    font-size: 11.5px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: border-color 0.12s;
  }
  .source-chip:hover { border-color: var(--color-text-primary); }
  .source-chip-name {
    font-weight: 500;
    color: var(--color-text-primary);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .source-chip-loc {
    color: var(--color-text-secondary);
    font-size: 10.5px;
    flex-shrink: 0;
  }
  .source-chip-open {
    color: var(--color-text-tertiary);
    font-size: 13px;
    flex-shrink: 0;
    line-height: 1;
  }

  /* Quote view — PDF sentence in context, with the claim span highlighted */
  .quote-view {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 14px 16px;
    font-family: var(--font-serif);
    font-size: 13px;
    line-height: 1.7;
    color: var(--color-text-secondary);
  }
  .quote-view .highlight {
    color: var(--color-text-primary);
    background: var(--amber-fill);
    padding: 1px 2px;
    border-radius: 2px;
    box-shadow: inset 0 -2px 0 var(--amber-mid);
  }
  .quote-view .ellipsis {
    color: var(--color-text-tertiary);
    font-style: italic;
    letter-spacing: 0.05em;
  }
  .quote-meta {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--color-text-secondary);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 0.5px solid var(--color-border-tertiary);
    display: flex;
    justify-content: space-between;
  }

  /* Cell view — CSV row/col tuple with neighbors */
  .cell-view {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    overflow: hidden;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .cell-table {
    width: 100%;
    border-collapse: collapse;
  }
  .cell-table th,
  .cell-table td {
    padding: 6px 10px;
    text-align: left;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    border-right: 0.5px solid var(--color-border-tertiary);
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cell-table th {
    background: var(--color-background-secondary);
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    position: sticky;
    top: 0;
  }
  .cell-table th.target-col {
    background: var(--amber-fill);
    color: var(--amber-text);
  }
  .cell-table td.target-cell {
    background: var(--amber-fill);
    color: var(--amber-text);
    font-weight: 600;
    box-shadow: inset 0 0 0 1.5px var(--amber-mid);
  }
  .cell-table td.neighbor { color: var(--color-text-secondary); }
  .cell-table td.row-label {
    font-size: 10px;
    color: var(--color-text-tertiary);
    background: var(--color-background-secondary);
    font-weight: 500;
  }
  .cell-table tr:last-child td { border-bottom: none; }
  .cell-table th:last-child,
  .cell-table td:last-child { border-right: none; }
  .cell-scroll {
    max-width: 100%;
    overflow-x: auto;
  }

  /* Derived view — expression box with drillable input list */
  .derived-expr {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 10px 12px;
    line-height: 1.55;
    word-break: break-word;
  }
  .derived-expr .expr-op {
    color: var(--amber-text);
    font-weight: 600;
  }
  .derived-expr .expr-result {
    display: block;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 0.5px dashed var(--color-border-secondary);
    color: var(--color-text-primary);
  }
  .derived-expr .expr-result::before {
    content: '= ';
    color: var(--color-text-tertiary);
    font-weight: normal;
  }

  .input-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .input-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 11px;
    transition: border-color 0.12s, background 0.12s;
  }
  .input-item:hover {
    border-color: var(--color-text-primary);
    background: var(--color-background-secondary);
  }
  .input-kind {
    font-size: 9px;
    font-weight: 600;
    padding: 1.5px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .input-kind-cell { background: var(--teal-fill); color: var(--teal-text); }
  .input-kind-quote { background: var(--amber-fill); color: var(--amber-text); }
  .input-kind-derived { background: #E8E4F5; color: #3E2F7A; }
  .input-loc {
    color: var(--color-text-secondary);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .input-value {
    color: var(--color-text-primary);
    font-weight: 600;
    flex-shrink: 0;
  }

  /* Conflict view — two stacked provenances with delta */
  .conflict-stack {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 0.5px solid #F7C1C1;
    border-radius: var(--border-radius-md);
    overflow: hidden;
  }
  .conflict-side {
    padding: 10px 12px;
    background: var(--color-background-primary);
  }
  .conflict-side.reported {
    background: var(--red-fill);
    border-bottom: 0.5px solid #F7C1C1;
  }
  .conflict-side.source {
    background: var(--color-background-primary);
  }
  .conflict-side-label {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 5px;
  }
  .conflict-side.reported .conflict-side-label { color: var(--red-text); }
  .conflict-side-value {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--color-text-primary);
  }
  .conflict-side-loc {

<script>
/* ===========================================================================
   NL EXPLORER
   ---------------------------------------------------------------------------
   A prototype newsroom tool where every written claim is an event dispatched
   through the EO-DB nine-case fold. The fold classifies each claim as
   grounded / conflict / absent by walking the operator stages:
     SIG → recognize signal (pattern hit in source)
     INS → mint anchor (entity/value identity established)
     CON → link to graph (cross-source edges)
     DEF → establish term (assignment of value)
     EVA → evaluate against definitions (confirm / conflict)
     NUL → record absence (expected pattern not found)
   Provenance is the traversal trace itself — nothing to reconstruct after
   the fact because nothing was thrown away.
============================================================================ */

/* ---------- SOURCES ---------- */
const SOURCES = [
  { id: 'ndp', name: 'ndp_budget_fy25.csv', kind: 'csv', meta: '847 rows', indexed: true },
  { id: 'min', name: 'council_minutes_mar7.pdf', kind: 'pdf', meta: '12 pp', indexed: true },
  { id: 'ohs', name: 'ohs_quarterly_q4.pdf', kind: 'pdf', meta: '31 pp', indexed: true },
  { id: 'ven', name: 'vendor_contracts.txt', kind: 'txt', meta: 'indexing…', indexed: false }
];

/* ---------- ARTICLE (claims are events in the given-log) ---------- */
/* Each run is a text fragment; claims have .id and a :claim marker.       */
const ARTICLE = [
  { p: [
    { t: 'The Nashville Downtown Partnership received ' },
    { t: '$4.2 million', c: 'm1' },
    { t: ' in public funds during fiscal year 2025, a ' },
    { t: '14.3 percent increase', c: 'm2' },
    { t: ' over the prior year, according to budget documents obtained from Metro Finance. The increase followed a motion by ' },
    { t: 'Councilmember Torres', c: 'm3' },
    { t: ' on ' },
    { t: 'March 7', c: 'm4' },
    { t: ' to amend the public safety allocation.' }
  ]},
  { p: [
    { t: 'The Partnership has contracted with ' },
    { t: 'Solaren International', c: 'm5' },
    { t: ' for private security services since ' },
    { t: '2019', c: 'm6' },
    { t: ', at a cost the organization describes as ' },
    { t: '$280,000 annually', c: 'c1' },
    { t: '. Internal documents reviewed by this reporter put the figure at ' },
    { t: '$312,000', c: 'm7' },
    { t: ', a discrepancy the Partnership has not publicly explained.' }
  ]},
  { p: [
    { t: "Metro's Office of Homeless Services " },
    { t: 'did not respond to requests for comment', c: 'a1' },
    { t: " about the overlap between the Partnership's security footprint and OHS encampment clearance operations. " },
    { t: 'No disclosure of the Solaren contract', c: 'a2' },
    { t: " appears in the Partnership's public filings for the period." }
  ]}
];

/* ---------- CLAIMS (fold output — what the nine-case dispatch produced) */
/* Each claim has a typed `prov` field describing HOW it came from its source.
   The panel renders based on prov.kind:
     quote    → PDF sentence in context, span highlighted
     cell     → CSV row/col tuple with neighboring cells
     derived  → expression + drillable list of input provenances (recursive)
     conflict → two stacked provenances + delta
     absence  → what was expected, where we scanned, what's missing          */
const CLAIMS = {
  m1: {
    type: 'grounded',
    text: '$4.2 million',
    conf: 1.00,
    status: 'pending',
    prov: {
      kind: 'derived',
      expr: 'SUM(amount) WHERE dept = public_safety AND fy = 2025',
      op: 'SUM',
      result: '$4,231,440',
      display: '$4.2 million',
      inputs: [
        { kind: 'cell', src: 'ndp_budget_fy25.csv', row: 112, col: 'amount', value: '$823,400' },
        { kind: 'cell', src: 'ndp_budget_fy25.csv', row: 113, col: 'amount', value: '$1,104,200' },
        { kind: 'cell', src: 'ndp_budget_fy25.csv', row: 114, col: 'amount', value: '$890,000' },
        { kind: 'cell', src: 'ndp_budget_fy25.csv', row: 115, col: 'amount', value: '$712,840' },
        { kind: 'cell', src: 'ndp_budget_fy25.csv', row: 116, col: 'amount', value: '$701,000' }
      ]
    },
    trace: [
      { op: 'SIG', txt: 'value pattern <code>\\$[\\d.]+M</code> hit — six occurrences aggregated' },
      { op: 'INS', txt: 'document anchor minted for <strong>public_safety_2025</strong> line set' },
      { op: 'CON', txt: 'linked to NDP entity via <strong>recipient_id</strong> column' },
      { op: 'DEF', txt: '<strong>SUM</strong> evaluated: $4,231,440 → rounded presentation $4.2M' }
    ]
  },
  m2: {
    type: 'grounded',
    text: '14.3 percent increase',
    conf: 1.00,
    status: 'pending',

const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];

let selectedReviewId = null;

/* ---- Sources ---- */
function renderSources() {
  $('#slist').innerHTML = SOURCES.map(s => `
    <div class="sitem${s.indexed ? '' : ' pending'}">
      <div class="sitem-name">${s.name}</div>
      <div class="sitem-meta">
        <span class="stag stag-${s.kind}">${s.kind.toUpperCase()}</span>${s.meta}
      </div>
    </div>
  `).join('');
}

/* ---- Article body: render runs, wrap claims in span with class ---- */
function articleHtml({interactive = true} = {}) {
  return ARTICLE.map(para => {
    const inner = para.p.map(r => {
      if (!r.c) return escapeHtml(r.t);
      const claim = CLAIMS[r.c];
      const cls = claim.type === 'grounded' ? 'g' : claim.type === 'conflict' ? 'conflict' : 'absent';
      const attrs = interactive
        ? `class="${cls}" data-id="${r.c}"`
        : `class="${cls}"`;
      return `<span ${attrs}>${escapeHtml(r.t)}</span>`;
    }).join('');
    return `<p>${inner}</p>`;
  }).join('');
}

function renderArticleBody(container, {interactive = true} = {}) {
  container.innerHTML = articleHtml({interactive});
  if (interactive) {
    container.querySelectorAll('[data-id]').forEach(el => {
      el.addEventListener('click', () => showClaim(el.dataset.id));
    });
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ---- Counts ---- */
function renderCounts() {
  const all = Object.values(CLAIMS);
  const g = all.filter(c => c.type === 'grounded').length;
  const c = all.filter(c => c.type === 'conflict').length;
  const a = all.filter(c => c.type === 'absent').length;
  $('#stat-g').textContent = g;
  $('#stat-c').textContent = c;
  $('#stat-a').textContent = a;
  $('#counts-meta').innerHTML =
    `<span class="c-g">${g} grounded</span> · <span class="c-c">${c} conflict</span> · <span class="c-a">${a} absent</span>`;
}

/* ---- Claim detail panel ---- */
function showClaim(id, opts = {}) {
  const claim = CLAIMS[id];
  if (!claim) return;
  selectedClaimId = id;

  $$('.g, .conflict, .absent', $('#article-body')).forEach(el => el.classList.remove('active'));
  const el = $(`[data-id="${id}"]`, $('#article-body'));
  if (el) el.classList.add('active');

  $('#rp-empty').style.display = 'none';
  $('#rp-content').classList.add('visible');

  const typeLabels = {
    grounded: 'Grounded',
    conflict: 'Conflict',
    absent:   'Absent · NUL event'
  };
  const typeLabel = $('#rp-type-label');
  typeLabel.textContent = typeLabels[claim.type];
  typeLabel.className = 'rphead-title type-' + claim.type;

  const confColor =
    claim.conf >= 0.97 ? 'var(--teal-mid)' :
    claim.conf >= 0.85 ? 'var(--amber-mid)' : 'var(--red-mid)';

  // Claim statement (always shown)
  let body = `
    <div class="prov-section">
      <div class="prov-label">Claim</div>
      <div class="prov-code">"${escapeHtml(claim.text)}"</div>
    </div>
  `;

  // Provenance — dispatch on kind
  body += renderProvenance(claim.prov, { topLevel: true });

  // Confidence — append a "drill any input ↓" hint when this is a nested
  // derivation (a derived prov whose inputs are themselves derived), since
  // each input row is itself drillable provenance, not a leaf.
  const confKind =
    claim.conf >= 0.97 ? 'mechanical' :
    claim.conf >= 0.85 ? 'probabilistic' : 'weak';
  const isNestedDerived = claim.prov && claim.prov.kind === 'derived'
    && (claim.prov.inputs || []).some(i => i.kind === 'derived');
  const drillHint = isNestedDerived ? ' · drill any input ↓' : '';
  body += `
    <div class="prov-section">
      <div class="prov-label">Confidence</div>
      <div class="conf-bar-wrap">
        <div class="conf-bar" style="width: ${Math.round(claim.conf * 100)}%; background: ${confColor};"></div>
      </div>
      <div class="conf-label">${claim.conf.toFixed(2)} · ${confKind}${drillHint}</div>
    </div>
  `;

  // Inspect fold events — collapsed affordance, the old traversal lives here
  if (claim.trace && claim.trace.length) {
    body += `
      <div class="inspect-fold" data-toggle="fold">
        <span id="fold-caret">▸</span> inspect fold events (${claim.trace.length})
      </div>
      <div class="inspect-fold-body" id="fold-body">
        <div class="traverse">
          ${claim.trace.map(step => `
            <div class="traverse-step">
              <div class="traverse-step-rail">
                <div class="traverse-step-dot fired"></div>
                <div class="traverse-step-line"></div>
              </div>
              <div class="traverse-step-text">
                <span class="op op-${step.op.toLowerCase()}">${step.op}</span>${step.txt}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  body += `
    <div class="divider"></div>
    <div class="prov-actions">
      <button class="btn-sm">Correct</button>
      <button class="btn-sm btn-sm-danger">Release</button>
    </div>
  `;

  $('#rp-body').innerHTML = body;

  // wire up the fold-events toggle
  const foldToggle = $('[data-toggle="fold"]', $('#rp-body'));
  if (foldToggle) {
    foldToggle.addEventListener('click', () => {
      const b = $('#fold-body');
      const caret = $('#fold-caret');
      const open = b.classList.toggle('open');
      caret.textContent = open ? '▾' : '▸';
    });
  }

  // wire up input-item drill-down (for derived prov)
  $$('.input-item', $('#rp-body')).forEach(item => {
    item.addEventListener('click', () => {
      // Drill into nested derivation — in a real app this would navigate
      // to a sub-panel; here we flash it to show the intent
      item.style.transition = 'background 0.2s';
      item.style.background = 'var(--amber-fill)';
      setTimeout(() => item.style.background = '', 400);
    });
  });
}

/* Render a provenance object. Returns HTML string. */
function renderProvenance(prov, { topLevel = false } = {}) {
  if (!prov) return '';

  switch (prov.kind) {
    case 'quote':      return renderQuoteProv(prov, topLevel);
    case 'cell':       return renderCellProv(prov, topLevel);
    case 'derived':    return renderDerivedProv(prov, topLevel);
    case 'conflict':   return renderConflictProv(prov, topLevel);
    case 'absence':    return renderAbsenceProv(prov, topLevel);
    default: return `<div class="prov-section"><div class="prov-code">${escapeHtml(JSON.stringify(prov))}</div></div>`;
  }
}

function renderQuoteProv(p, topLevel) {
  const loc = p.page ? `${p.src} · p.${p.page}` : p.src;
  return `
    <div class="prov-section">
      <div class="prov-label">Source quote</div>
      <div class="source-chip">
        <span class="source-chip-name">${escapeHtml(p.src)}</span>
        <span class="source-chip-loc">${p.page ? 'p.' + p.page : p.spanLabel}</span>
        <span class="source-chip-open">↗</span>
      </div>
      <div class="quote-view">
        <span>${escapeHtml(p.before)}</span><span class="highlight">${escapeHtml(p.highlight)}</span><span>${escapeHtml(p.after)}</span>
        <div class="quote-meta">
          <span>${escapeHtml(p.spanLabel)}</span>
          <span>open in source →</span>
        </div>
      </div>
    </div>
  `;
}

function renderCellProv(p, topLevel) {
  const targetColIdx = p.headers.indexOf(p.col);
  const rowsHtml = p.rows.map(row => {
    const isTarget = row[0] === p.row;
    const cells = row.map((v, i) => {
      if (i === 0) return `<td class="row-label">${escapeHtml(String(v))}</td>`;
      const isTargetCell = isTarget && i === targetColIdx;
      const cls = isTargetCell ? 'target-cell' : 'neighbor';
      return `<td class="${cls}">${escapeHtml(String(v))}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  const headersHtml = p.headers.map((h, i) => {
    const cls = i === targetColIdx ? 'target-col' : '';
    return `<th class="${cls}">${escapeHtml(h)}</th>`;
  }).join('');

  return `
    <div class="prov-section">
      <div class="prov-label">Source cell</div>
      <div class="source-chip">
        <span class="source-chip-name">${escapeHtml(p.src)}</span>
        <span class="source-chip-loc">row ${p.row} · ${escapeHtml(p.col)}</span>
        <span class="source-chip-open">↗</span>
      </div>
      <div class="cell-view">
        <div class="cell-scroll">
          <table class="cell-table">
            <thead><tr>${headersHtml}</tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderDerivedProv(p, topLevel) {
  // nested derivations: show the expression, then list inputs.
  // inputs are clickable; leaves (quote/cell) open the leaf view, nested
  // derived inputs drill one level deeper.
  const inputsHtml = (p.inputs || []).map((inp, i) => {
    let loc, value, kindClass;
    if (inp.kind === 'cell') {
      loc = `${inp.src} · row ${inp.row} · ${inp.col}`;
      value = inp.value;
      kindClass = 'input-kind-cell';
    } else if (inp.kind === 'quote') {
      loc = `${inp.src}${inp.page ? ' · p.' + inp.page : ''}`;
      value = '"' + (inp.highlight.length > 30 ? inp.highlight.slice(0,28) + '…' : inp.highlight) + '"';
      kindClass = 'input-kind-quote';
    } else if (inp.kind === 'derived') {
      loc = inp.label || inp.expr;
      value = inp.result;
      kindClass = 'input-kind-derived';
    }
    return `
      <div class="input-item" data-input-idx="${i}">
        <span class="input-kind ${kindClass}">${inp.kind}</span>
        <span class="input-loc">${escapeHtml(loc)}</span>
        <span class="input-value">${escapeHtml(value)}</span>
      </div>
    `;
  }).join('');

  return `
    <div class="prov-section">
      <div class="prov-label">Operation</div>
      <div class="derived-expr">
        ${escapeHtml(p.expr)}
        <span class="expr-result">${escapeHtml(p.result)}</span>
      </div>
    </div>
    <div class="prov-section">
      <div class="prov-label">Inputs · ${(p.inputs || []).length}</div>
      <div class="input-list">${inputsHtml}</div>
    </div>
  `;
}

function renderConflictProv(p, topLevel) {
  const reportedLoc = p.reported.kind === 'quote'
    ? `${p.reported.src} · p.${p.reported.page}`
    : `${p.reported.src} · row ${p.reported.row}`;
  const sourceLoc = p.source.kind === 'cell'
    ? `${p.source.src} · row ${p.source.row} · ${p.source.col}`
    : `${p.source.src} · p.${p.source.page}`;

  const reportedValue = p.reported.kind === 'quote' ? p.reported.highlight : p.reported.value;
  const sourceValue = p.source.kind === 'cell' ? p.source.value : p.source.highlight;

  // Render the quote-in-context for the reported side, since the human voice matters
  let reportedBody = '';
  if (p.reported.kind === 'quote') {
    reportedBody = `
      <div class="quote-view" style="margin-top: 8px;">
        <span>${escapeHtml(p.reported.before)}</span><span class="highlight">${escapeHtml(p.reported.highlight)}</span><span>${escapeHtml(p.reported.after)}</span>
      </div>
    `;
  }

  return `
    <div class="prov-section">
      <div class="prov-label">Two sources disagree</div>
      <div class="conflict-stack">
        <div class="conflict-side reported">
          <div class="conflict-side-label">Reported</div>
          <div class="conflict-side-value">${escapeHtml(reportedValue)}</div>
          <div class="conflict-side-loc">${escapeHtml(reportedLoc)}</div>
        </div>
        <div class="conflict-side source">
          <div class="conflict-side-label">Source of record</div>
          <div class="conflict-side-value">${escapeHtml(sourceValue)}</div>
          <div class="conflict-side-loc">${escapeHtml(sourceLoc)}</div>
        </div>
        <div class="conflict-delta">
          <span>Δ</span>
          <span class="conflict-delta-val">${escapeHtml(p.delta)} · ${escapeHtml(p.deltaPct)}</span>
        </div>
      </div>
      ${reportedBody}
    </div>
  `;
}

function renderAbsenceProv(p, topLevel) {
  return `
    <div class="prov-section">
      <div class="prov-label">Expected</div>
      <div class="absence-view">
        <div class="absence-expected">${p.expected}</div>
        <div class="absence-scan">
          ${p.scanned.map(s => `
            <div class="absence-scan-item">
              <span>${escapeHtml(s.src)}</span>
              <span style="color: var(--color-text-tertiary); margin-left: 6px;">— ${escapeHtml(s.note)}</span>
            </div>
          `).join('')}
        </div>
        <div style="margin-top: 10px; padding-top: 8px; border-top: 0.5px dashed var(--color-border-tertiary); font-family: var(--font-mono); font-size: 10.5px; color: var(--color-text-secondary);">
          window: ${escapeHtml(p.window)}
        </div>
      </div>
    </div>
  `;
}

/* Short human-readable summary of a claim's provenance, for list rendering */
function provSummary(claim) {
  const p = claim.prov;
  if (!p) return '';
  switch (p.kind) {
    case 'quote':    return 'direct quote';
    case 'cell':     return `cell value · ${p.col}`;
    case 'derived':  return p.op + '(' + (p.inputs || []).length + ' inputs)';
    case 'conflict': return 'two sources disagree';
    case 'absence':  return 'expected pattern not found';
    default: return '';
  }
}

/* Short locator string (source filename + position) */
function provLocator(claim) {
  const p = claim.prov;
  if (!p) return '';
  switch (p.kind) {
    case 'quote':    return `${p.src}${p.page ? ' · p.' + p.page : ''}`;
    case 'cell':     return `${p.src} · row ${p.row} · ${p.col}`;
    case 'derived':  return `derived · ${(p.inputs || []).length} inputs`;
    case 'conflict': {
      const r = p.reported.kind === 'quote' ? `${p.reported.src}:p.${p.reported.page}` : `${p.reported.src}:row ${p.reported.row}`;
      const s = p.source.kind === 'cell' ? `${p.source.src}:row ${p.source.row}` : `${p.source.src}:p.${p.source.page}`;
      return `${r} ⟷ ${s}`;
    }
    case 'absence':  return `scanned ${p.scanned.length} sources · window ${p.window}`;
    default: return '';
  }
}

function renderReview() {
  $('#review-article').innerHTML = `
    <div class="article-meta">
      <span style="color: var(--color-text-secondary)">Review mode · read only</span>
    </div>
    <h1 class="article-title" style="font-family: var(--font-serif)">The Private Police and the Public Budget</h1>
    <div class="article-body">${articleHtml({interactive: false})}</div>
  `;

  const pending = Object.entries(CLAIMS).filter(([, c]) => c.status === 'pending');
  $('#qhead-count').textContent = `${pending.length} remaining`;

  const queue = Object.entries(CLAIMS)
    .sort(([, a], [, b]) => {
      const order = {conflict: 0, absent: 1, grounded: 2};
      if (a.status !== b.status) return a.status === 'pending' ? -1 : 1;
      return order[a.type] - order[b.type];
    });

  $('#qlist').innerHTML = queue.map(([id, c]) => {
    if (c.status !== 'pending') return '';
    const tagMap = {grounded: 'prov-tag-amber', conflict: 'prov-tag-red', absent: 'prov-tag-blue'};
    const label = {grounded: 'grounded', conflict: 'conflict', absent: 'absent'}[c.type];
    const selected = selectedReviewId === id ? ' selected' : '';

    // Derive a short summary line and source locator from the provenance shape
    const summary = provSummary(c);
    const locator = provLocator(c);

    return `
      <div class="qcard${selected}" data-id="${id}">
        <div class="qcard-head">
          <span class="prov-tag ${tagMap[c.type]}">${label}</span>
        </div>
        <div class="qcard-text">"${escapeHtml(c.text)}" · ${escapeHtml(summary)}</div>
        <div class="qcard-source">${escapeHtml(locator)}</div>
        <div class="qcard-actions">
          <button class="qa qa-confirm" data-action="confirm" data-id="${id}">Confirm</button>
          <button class="qa" data-action="correct" data-id="${id}">Correct</button>
          <button class="qa qa-release" data-action="release" data-id="${id}">Release</button>
        </div>
      </div>
    `;
  }).join('') || `<div class="qempty">queue clear<br><span style="opacity:0.7">all claims resolved</span></div>`;

  $$('.qa', $('#qlist')).forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      if (action === 'confirm') { CLAIMS[id].status = 'confirmed'; }
      else if (action === 'release') { CLAIMS[id].status = 'released'; }
      else if (action === 'correct') { CLAIMS[id].status = 'corrected'; }
      renderReview();
    });
  });

  $$('.qcard', $('#qlist')).forEach(card => {
    card.addEventListener('click', () => {
      selectedReviewId = card.dataset.id;
      renderReview();
    });
  });
}

/* ---- Chat ---- */
function renderChat() {
  $('#chat-msgs').innerHTML = CHAT_HISTORY.map((m, i) => {
    if (m.role === 'user') {
      return `
        <div class="chat-msg chat-msg-user">
          <div class="chat-avatar av-user">M</div>
          <div class="chat-bubble chat-bubble-user">${escapeHtml(m.text)}</div>
        </div>
      `;
    }
    // system
    const evBlock = m.evidence ? `
      <div class="evidence-toggle" data-ev="${i}">
        <span class="ev-toggle-label">Evidence — ${m.evidence.length} claims</span>
        <span class="ev-toggle-count">show ↓</span>
      </div>
      <div class="ev-cards" id="ev-cards-${i}">
        ${m.evidence.map(e => `
          <div class="ev-card">
            <div class="ev-card-claim">${escapeHtml(e.claim)}</div>
            <div class="ev-card-path">${escapeHtml(e.path)}</div>
            <div class="ev-card-footer">
              <span class="prov-tag prov-tag-${e.tagColor}">${e.tag}</span>
              <button class="ev-rederive">re-derive</button>
            </div>
          </div>
        `).join('')}
      </div>
    ` : '';

    const metaNote = m.meta ? `
      <div class="chat-meta-note">
        <span class="fold-badge">fold</span>${escapeHtml(m.meta)}
      </div>
    ` : '';

    return `
      <div class="chat-msg">
        <div class="chat-avatar av-sys">NL</div>
        <div class="chat-bubble">
          ${metaNote}
          <div>${m.html}</div>
          ${evBlock}
        </div>
      </div>
    `;
  }).join('');

  $$('.evidence-toggle').forEach(el => {
    el.addEventListener('click', () => {
      const i = el.dataset.ev;
      const cards = $('#ev-cards-' + i);
      const open = cards.classList.toggle('open');
      el.querySelector('.ev-toggle-count').textContent = open ? 'hide ↑' : 'show ↓';
    });
  });

  // instruction set
  $('#iset-body').innerHTML = ISET.map(r => `
    <div class="iset-rule">
      <div class="iset-rule-head">
        <span class="iset-type stag ${r.color}">${r.type}</span>
        <span class="iset-trigger">${r.trigger}</span>
      </div>
      <div class="iset-text">${escapeHtml(r.text)}</div>
    </div>
  `).join('') + `
    <div class="iset-footer">
      3 rules · 2 firings today · 1 candidate refinement pending review
    </div>
  `;
}

function sendChatMessage() {
  const input = $('#chat-input');
  const text = input.value.trim();
  if (!text) return;
  CHAT_HISTORY.push({ role: 'user', text });
  // stub response — in a real build this is the fold applied to the question
  CHAT_HISTORY.push({
    role: 'system',
    meta: 'LLM synthesis · grounded in fold state',
    html: `Indexed sources don't yet answer that directly. The fold has ${
      Object.values(CLAIMS).filter(c => c.type === 'grounded').length
    } grounded claims and ${
      Object.values(CLAIMS).filter(c => c.type === 'absent').length
    } NUL events against the corpus as loaded. Would you like me to register this as a new query intent, so future ingested sources are scanned for it?`,
    evidence: null
  });
  input.value = '';
  input.style.height = 'auto';
  renderChat();
  $('#chat-msgs').scrollTop = $('#chat-msgs').scrollHeight;
}

/* ---- Mode switching ---- */
function switchMode(mode) {
  $$('.mtab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  $$('.mode-panel').forEach(p => p.classList.toggle('active', p.id === 'mode-' + mode));

  if (mode === 'review') renderReview();
  if (mode === 'chat') renderChat();
}

/* ---- Boot ---- */
function init() {
  renderSources();
  renderArticleBody($('#article-body'));
  renderCounts();

  $$('.mtab').forEach(b => {
    b.addEventListener('click', () => switchMode(b.dataset.mode));
  });

  $('#rp-close').addEventListener('click', closeClaim);

  $('#chat-send').addEventListener('click', sendChatMessage);
  $('#chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChatMessage();
    }
  });
  $('#chat-input').addEventListener('input', e => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  });
}

init();
</script>
</body>
